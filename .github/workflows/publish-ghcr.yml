name: Publish GHCR

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: santiagoatehortuasoto/api-lgym-despliegue

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          IMAGE_URI="${REGISTRY}/${IMAGE_NAME}"
          TAGS="${IMAGE_URI}:sha-${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
            TAGS="${TAGS},${IMAGE_URI}:${BRANCH_TAG}"
          fi

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS="${TAGS},${IMAGE_URI}:latest"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAGS="${TAGS},${IMAGE_URI}:${GITHUB_REF_NAME}"
          fi

          echo "value=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build image
        shell: bash
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.value }}"
          BUILD_TAGS=()
          for tag in "${TAG_ARRAY[@]}"; do
            BUILD_TAGS+=(-t "$tag")
          done
          docker build "${BUILD_TAGS[@]}" .

      - name: Push image tags
        shell: bash
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.value }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker push "$tag"
          done

      - name: Publish image summary
        run: |
          echo "Imagen publicada en: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags generados:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.tags.outputs.value }}' | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
